version: 2

models:

  - name: int_seven_days__entries
    description: >
      Grain change from session (purchase) to entry (one row per individual ticket play).
      Flattens the ticket_array JSON from stg_seven_days__sessions into one row per entry.
    columns:
      - name: entry_id
        description: Primary key — ticket identifier extracted from the JSON array.
        tests:
          - unique
          - not_null
      - name: session_id
        description: FK to the parent purchase session.
        tests:
          - not_null
      - name: user_id
        description: FK to the user who played this entry.
        tests:
          - not_null
      - name: client_id
        tests:
          - not_null
          - accepted_values:
              values: ['7days_performance']
      - name: tenant_id
        tests:
          - not_null
          - accepted_values:
              values: ['seven_days_performance', 'ukcc']
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['instant_win']
      - name: prize_tier
        description: Integer tier of the prize slot (0 = no prize, higher tiers = larger prizes).
      - name: is_played
        description: Whether the user has revealed/played this entry.
        tests:
          - not_null
      - name: session_entry_number
        description: 1-based position of this entry within its purchase session.
      - name: user_entry_number
        description: Cumulative count of entries played by this user across all sessions, ordered by time.
